<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Quản Trị Nội Dung | Tứ Minh</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
    
    <script>
      // 1. Giữ nguyên tính năng đăng nhập
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) { window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; }); }
        });
      }

      // =========================================================
      // 2. KHU VỰC TÙY CHỈNH GIAO DIỆN PREVIEW (GIỐNG HỆT WEB THẬT)
      // =========================================================
      
      const TuMinhPreviewCSS = `
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        /* Đồng bộ nền đen (Dark mode) và Font chữ */
        body {
          font-family: 'Inter', sans-serif;
          background-color: #0a0a0a;
          color: #d4d4d8;
          padding: 2rem;
          margin: 0;
        }
        
        /* Giới hạn độ rộng giống hệt khung đọc bài trên web */
        .preview-container { max-width: 896px; margin: 0 auto; }
        
        /* Style cho Header bài viết */
        .preview-header { border-bottom: 1px solid #27272a; padding-bottom: 2.5rem; margin-bottom: 2.5rem; }
        .preview-category { display: inline-block; background-color: #2563eb; color: white; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: bold; padding: 6px 16px; margin-bottom: 1.5rem; }
        .preview-title { font-size: 3rem; font-weight: 700; color: white; line-height: 1.2; margin: 0 0 1.5rem 0; letter-spacing: -0.02em; }
        .preview-meta { color: #6b7280; font-size: 0.875rem; font-weight: 300; border-top: 1px solid rgba(39, 39, 42, 0.5); padding-top: 1.5rem; }
        
        /* Đồng bộ bộ CSS .cms-content từ file index.html gốc */
        .cms-content h2 { font-size: 1.875rem; font-weight: 700; color: white; margin-top: 4rem; margin-bottom: 1.5rem; }
        .cms-content p { margin-bottom: 1.5rem; color: #d4d4d8; font-weight: 300; line-height: 1.625; font-size: 1.125rem; }
        .cms-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 2.5rem; border-left: 1px solid #27272a; margin-left: 0.5rem; }
        .cms-content li { margin-bottom: 1rem; color: #d4d4d8; font-weight: 300; }
        .cms-content strong { color: white; font-weight: 700; }
        .cms-content blockquote { font-style: italic; color: #9ca3af; margin-bottom: 2.5rem; font-size: 1.25rem; border-left: 4px solid #4b5563; padding-left: 1.5rem; }
        
        /* Chỉnh CSS cho ảnh nội dung (Có viền trắng như web) */
        .cms-content img { width: 100%; max-height: 450px; object-fit: contain; background: white; padding: 0.5rem; margin: 3rem 0; border: 1px solid #27272a; }
      `;
      
      // Bơm CSS vào cửa sổ Preview
      CMS.registerPreviewStyle(TuMinhPreviewCSS, { raw: true });

      // Vẽ lại khung HTML bên phải (Preview) sao cho giống web nhất
      const ArticlePreview = createClass({
        render: function() {
          const entry = this.props.entry;
          const title = entry.getIn(['data', 'title']) || 'Tiêu đề bài viết sẽ hiển thị ở đây...';
          const category = entry.getIn(['data', 'category']) || 'Danh mục';
          const readTime = entry.getIn(['data', 'read_time']) || '5 phút đọc';
          // Lấy nội dung body do widget sinh ra
          const body = this.props.widgetFor('body');

          return h('div', { className: 'preview-container' },
            h('div', { className: 'preview-header' },
              h('span', { className: 'preview-category' }, category),
              h('h1', { className: 'preview-title' }, title),
              h('div', { className: 'preview-meta' }, '✍️ Chuyên gia Tứ Minh — ⏳ ' + readTime)
            ),
            h('div', { className: 'cms-content' }, body)
          );
        }
      });

      CMS.registerPreviewTemplate('posts', ArticlePreview);
    </script>
  </body>
</html>
