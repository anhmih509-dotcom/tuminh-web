<script>
// ==========================================
// CONFIG
// ==========================================
const PROXY = 'https://tuminh-oauth.anh-mih-509.workers.dev/gh';
const BRANCH = 'main';
const PASSWORD = 'hg8045adhna1965'; // ← ĐỔI MẬT KHẨU TẠI ĐÂY

// ==========================================
// AUTH
// ==========================================
function doLogin() {
  const pwd = document.getElementById('login-password').value;
  if (pwd === PASSWORD) {
    sessionStorage.setItem('tm-auth', '1');
    document.getElementById('screen-login').classList.add('hidden');
    document.getElementById('screen-app').classList.remove('hidden');
    initApp();
  } else {
    document.getElementById('login-error').classList.remove('hidden');
  }
}

function doLogout() {
  sessionStorage.removeItem('tm-auth');
  location.reload();
}

// Check if already logged in
if (sessionStorage.getItem('tm-auth') === '1') {
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-app').classList.remove('hidden');
}

// ==========================================
// STATE
// ==========================================
let editor = null;
let currentSection = 'posts';
let currentFile = null; // { path, slug, isNew }

// ==========================================
// GITHUB API
// ==========================================
async function ghFetch(path, options = {}) {
  const res = await fetch(PROXY + path, {
    method: options.method || 'GET',
    headers: { 'Content-Type': 'application/json' },
    body: options.body || undefined
  });
  if (!res.ok) throw new Error('GitHub API error: ' + res.status);
  return res.json();
}

async function listFiles(folder) {
  return ghFetch('/contents/' + folder);
}

async function getFile(path) {
  return ghFetch('/contents/' + path);
}

async function saveFile(path, content, sha = null) {
  const body = {
    message: sha ? 'Update ' + path : 'Create ' + path,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: BRANCH
  };
  if (sha) body.sha = sha;
  return ghFetch('/contents/' + path, { method: 'PUT', body: JSON.stringify(body) });
}

async function deleteFile(path, sha) {
  return ghFetch('/contents/' + path, {
    method: 'DELETE',
    body: JSON.stringify({ message: 'Delete ' + path, sha, branch: BRANCH })
  });
}

// ==========================================
// APP INIT
// ==========================================
function initApp() {
  initEditor();
  loadList('posts');
}

// ==========================================
// SECTION SWITCH
// ==========================================
function switchSection(section) {
  currentSection = section;
  ['posts','products','settings'].forEach(s => {
    const el = document.getElementById('nav-' + s);
    if (el) el.classList.toggle('active', s === section);
  });
  
  const titles = { posts: 'Bài viết Tri Thức', products: 'Sản phẩm', settings: 'Cài đặt Website' };
  document.getElementById('list-title').textContent = titles[section];
  
  closeEditor();
  if (section === 'settings') {
    loadSettings();
  } else {
    loadList(section);
  }
}

// ==========================================
// LIST VIEW
// ==========================================
async function loadList(section) {
  const container = document.getElementById('list-container');
  container.innerHTML = '<div class="text-gray-500 text-sm text-center py-10"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Đang tải...</div>';
  
  const folder = section === 'posts' ? 'posts' : 'products';
  try {
    const files = await listFiles(folder);
    const items = files.filter(f => f.name.endsWith('.txt') && f.name !== 'manifest.md');
    
    if (!items.length) {
      container.innerHTML = '<div class="text-gray-500 text-sm text-center py-10">Chưa có nội dung nào. Nhấn "Tạo mới" để bắt đầu.</div>';
      return;
    }

    container.innerHTML = items.map(f => {
      const slug = f.name.replace('.txt', '');
      return `<div class="post-card flex items-center gap-4" onclick="openEditor('${folder}/${f.name}', '${slug}')">
        <div class="flex-1">
          <div class="text-white font-medium text-sm">${slug}</div>
          <div class="text-gray-500 text-xs mt-0.5">${folder}/${f.name}</div>
        </div>
        <button onclick="event.stopPropagation(); confirmDelete('${folder}/${f.name}', '${f.sha}')" class="text-gray-600 hover:text-red-400 transition p-1">
          <i class="fa-solid fa-trash text-xs"></i>
        </button>
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = '<div class="text-red-400 text-sm text-center py-10">Lỗi tải danh sách: ' + e.message + '</div>';
  }
}

// ==========================================
// EDITOR
// ==========================================
function initEditor() {
  if (editor) return;
  
  // Load TipTap extensions
  const { Editor } = tiptap;
  const { StarterKit } = tiptapStarterKit;
  const { Color } = tiptapColor;
  const { TextStyle } = tiptapTextStyle;
  const { Underline } = tiptapUnderline;
  const { TextAlign } = tiptapTextAlign;
  const { Image } = tiptapImage;
  const { Link } = tiptapLink;
  const { Table } = tiptapTable;
  const { TableRow } = tiptapTableRow;
  const { TableCell } = tiptapTableCell;
  const { TableHeader } = tiptapTableHeader;

  editor = new Editor({
    element: document.getElementById('editor-container'),
    extensions: [
      StarterKit,
      TextStyle,
      Color,
      Underline,
      TextAlign.configure({ types: ['heading', 'paragraph'] }),
      Image.configure({ inline: false }),
      Link.configure({ openOnClick: false }),
      Table.configure({ resizable: true }),
      TableRow, TableCell, TableHeader,
    ],
    content: '',
    editorProps: {
      attributes: { class: 'editor-content focus:outline-none' }
    }
  });
}

async function openEditor(filePath, slug) {
  document.getElementById('view-list').classList.add('hidden');
  document.getElementById('view-editor').classList.remove('hidden');
  
  currentFile = { path: filePath, slug, isNew: false, sha: null };
  document.getElementById('save-status').textContent = 'Đang tải...';

  try {
    const file = await getFile(filePath);
    currentFile.sha = file.sha;
    const content = decodeURIComponent(escape(atob(file.content.replace(/\n/g,''))));
    
    // Parse frontmatter
    const { meta, body } = parseFrontmatter(content);
    renderMetaFields(meta);
    
    // Set editor content (HTML)
    editor.commands.setContent(body || '');
    document.getElementById('save-status').textContent = '';
  } catch(e) {
    document.getElementById('save-status').textContent = 'Lỗi: ' + e.message;
  }
}

function openNewEditor() {
  document.getElementById('view-list').classList.add('hidden');
  document.getElementById('view-editor').classList.remove('hidden');
  
  currentFile = { path: null, slug: null, isNew: true, sha: null };
  editor.commands.setContent('');
  renderMetaFields({});
  document.getElementById('save-status').textContent = '';
}

function closeEditor() {
  document.getElementById('view-editor').classList.add('hidden');
  document.getElementById('view-list').classList.remove('hidden');
  currentFile = null;
}

function collectMeta() {
  const meta = {};
  container = document.getElementById('meta-fields');
  container.querySelectorAll('[id^="meta-"]').forEach(el => {
    const key = el.id.replace('meta-', '');
    if (el.type === 'checkbox') meta[key] = el.checked ? 'true' : 'false';
    else meta[key] = el.value;
  });
  return meta;
}

// ==========================================
// SAVE
// ==========================================
async function saveContent() {
  const btn = document.getElementById('btn-save');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang lưu...';
  status.textContent = '';

  try {
    const meta = collectMeta();
    const slug = meta.slug || currentFile.slug;
    
    if (!slug) {
      alert('Vui lòng nhập Slug!');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Lưu & Publish';
      return;
    }

    const body = editor.getHTML();
    const folder = currentSection === 'posts' ? 'posts' : 'products';
    const filePath = folder + '/' + slug + '.txt';

    // Build frontmatter
    let frontmatter = '---\n';
    Object.entries(meta).forEach(([k, v]) => {
      frontmatter += k + ': ' + v + '\n';
    });
    frontmatter += '---\n\n' + body;

    await saveFile(filePath, frontmatter, currentFile.sha || null);
    
    currentFile.path = filePath;
    currentFile.slug = slug;
    currentFile.isNew = false;
    
    // Refresh SHA
    const updated = await getFile(filePath);
    currentFile.sha = updated.sha;

    status.textContent = '✓ Đã lưu ' + new Date().toLocaleTimeString('vi-VN');
    btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Lưu & Publish';
    btn.disabled = false;
  } catch(e) {
    status.textContent = '✗ Lỗi: ' + e.message;
    btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Lưu & Publish';
    btn.disabled = false;
  }
}

async function confirmDelete(path, sha) {
  if (!confirm('Xóa file này?\n' + path)) return;
  try {
    await deleteFile(path, sha);
    loadList(currentSection);
  } catch(e) {
    alert('Lỗi xóa: ' + e.message);
  }
}

// SETTINGS
// ==========================================
async function loadSettings() {
  const container = document.getElementById('list-container');
  container.innerHTML = '<div class="text-gray-500 text-sm text-center py-10"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Đang tải...</div>';
  
  try {
    const file = await getFile('settings/site.md');

    const { meta } = parseFrontmatter(content);
    
    container.innerHTML = `
      <div class="max-w-xl space-y-4">

        ${Object.entries(meta).map(([k, v]) => `

  }
}

async function saveSettings(sha) {
  try {
    const fields = {};
    document.querySelectorAll('[id^="setting-"]').forEach(el => {
      fields[el.id.replace('setting-', '')] = el.value;
    });
    let content = '---\n';
    Object.entries(fields).forEach(([k,v]) => content += k + ': ' + v + '\n');
    content += '---\n';
    await saveFile('settings/site.md', content, sha);
    alert('Đã lưu cài đặt!');
  } catch(e) {
    alert('Lỗi: ' + e.message);
  }
}

// ==========================================
// PARSE FRONTMATTER
// ==========================================
function parseFrontmatter(text) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const match = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!match) return { meta: {}, body: text };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const idx = line.indexOf(':');
    if (idx === -1) return;
    const key = line.slice(0, idx).trim();
    const val = line.slice(idx + 1).trim().replace(/^["']|["']$/g, '');
    meta[key] = val;
  });
  return { meta, body: match[2].trim() };
}

// ==========================================
// TOOLBAR ACTIONS
// ==========================================
function setHeading(level) {
  if (level === '0') editor.chain().focus().setParagraph().run();
  else editor.chain().focus().setHeading({ level: parseInt(level) }).run();
}

function setFontSize(size) {
  if (!size) return;
  editor.chain().focus().setMark('textStyle', { fontSize: size }).run();
}

function setColor(color) {
  editor.chain().focus().setColor(color).run();
  document.getElementById('current-color').style.background = color;
}

function setHighlight(color) {
  editor.chain().focus().setMark('textStyle', { backgroundColor: color }).run();
}

function insertLink() {
  const url = prompt('Nhập URL:');
  if (url) editor.chain().focus().setLink({ href: url }).run();
}

function insertImage() {
  const url = prompt('Nhập URL ảnh:');
  if (url) editor.chain().focus().setImage({ src: url }).run();
}

function insertTable() {
  editor.chain().focus().insertTable({ rows: 3, cols: 3, withHeaderRow: true }).run();
}
