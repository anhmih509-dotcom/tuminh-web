<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tứ Minh | Admin</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
body { background: #0a0a0a; color: #d4d4d8; height: 100vh; overflow: hidden; display: flex; }

/* Sidebar */
.sidebar { width: 220px; background: #0d0d0d; border-right: 1px solid #1f1f1f; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-logo { padding: 16px; border-bottom: 1px solid #1f1f1f; display: flex; align-items: center; gap: 10px; }
.logo-box { width: 28px; height: 28px; background: white; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: black; font-size: 11px; }
.sidebar-logo span { color: white; font-weight: 600; font-size: 14px; }
.sidebar-nav { padding: 12px; flex: 1; }
.nav-label { font-size: 10px; color: #4b5563; text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 8px 4px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #9ca3af; transition: all 0.15s; margin-bottom: 2px; }
.nav-item:hover { background: #1f2937; color: white; }
.nav-item.active { background: #1e3a5f; color: #60a5fa; }
.nav-item i { width: 16px; text-align: center; font-size: 13px; }
.sidebar-footer { padding: 12px; border-top: 1px solid #1f1f1f; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Login */
#screen-login { position: fixed; inset: 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; z-index: 100; }
.login-card { background: #141414; border: 1px solid #262626; border-radius: 12px; padding: 32px; width: 360px; }
.login-title { text-align: center; margin-bottom: 24px; }
.login-title .logo-box { width: 36px; height: 36px; font-size: 13px; margin: 0 auto 8px; }
.login-title h2 { color: white; font-size: 18px; }
.login-title p { color: #6b7280; font-size: 13px; margin-top: 4px; }
label { display: block; font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
input[type=password], input[type=text], input[type=url], textarea, select {
  width: 100%; background: #1a1a1a; border: 1px solid #374151; color: #d4d4d8;
  padding: 8px 12px; border-radius: 6px; font-size: 13px; font-family: inherit;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: #2563eb; }
.btn { padding: 9px 18px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: white; color: black; }
.btn-primary:hover { background: #e5e7eb; }
.btn-primary:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
.btn-blue { background: #2563eb; color: white; }
.btn-blue:hover { background: #1d4ed8; }
.btn-blue:disabled { background: #1e3a5f; cursor: not-allowed; }
.btn-danger { background: transparent; color: #6b7280; border: none; padding: 6px 8px; }
.btn-danger:hover { color: #ef4444; }
.error-msg { color: #f87171; font-size: 12px; margin-top: 6px; display: none; }

/* List view */
#view-list { flex: 1; overflow: auto; padding: 24px; }
.view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.view-header h1 { font-size: 18px; font-weight: 600; color: white; }
.post-card { background: #141414; border: 1px solid #262626; border-radius: 8px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.post-card:hover { border-color: #374151; background: #1a1a1a; }
.post-card-info { flex: 1; }
.post-card-slug { color: white; font-size: 13px; font-weight: 500; }
.post-card-path { color: #6b7280; font-size: 11px; margin-top: 2px; }
.empty-state { text-align: center; padding: 60px 20px; color: #6b7280; font-size: 13px; }

/* Editor view */
#view-editor { flex: 1; display: none; flex-direction: column; overflow: hidden; }
.editor-header { background: #0d0d0d; border-bottom: 1px solid #1f1f1f; padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
.editor-body { flex: 1; display: flex; overflow: hidden; }
.meta-panel { width: 260px; background: #0d0d0d; border-right: 1px solid #1f1f1f; overflow-y: auto; padding: 16px; flex-shrink: 0; }
.meta-panel .field { margin-bottom: 16px; }
.editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }

/* Quill override */
.ql-toolbar { background: #f9fafb; border: none !important; border-bottom: 1px solid #e5e7eb !important; padding: 8px 12px; }
.ql-container { flex: 1; overflow: auto; border: none !important; font-size: 15px; }
.ql-editor { min-height: 400px; padding: 24px 32px; color: #111827; line-height: 1.7; }
.ql-editor p { margin-bottom: 12px; }

/* Image upload */
.img-upload-area { border: 2px dashed #374151; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.15s; }
.img-upload-area:hover { border-color: #2563eb; background: #1e3a5f20; }
.img-preview { max-width: 100%; max-height: 120px; border-radius: 4px; margin-top: 8px; }

/* Save status */
.save-status { font-size: 12px; color: #6b7280; }
.save-status.success { color: #34d399; }
.save-status.error { color: #f87171; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-title">
      <div class="logo-box">TM</div>
      <h2>Tứ Minh Admin</h2>
      <p>Trang quản trị nội dung</p>
    </div>
    <div style="margin-bottom:16px">
      <label>Mật khẩu</label>
      <input type="password" id="login-pwd" placeholder="Nhập mật khẩu..." onkeydown="if(event.key==='Enter')doLogin()">
      <div class="error-msg" id="login-err">Mật khẩu không đúng</div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Đăng nhập</button>
  </div>
</div>

<!-- APP -->
<div id="screen-app" style="display:none;width:100%;height:100vh;display:none;flex-direction:row">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-box">TM</div>
      <span>Admin</span>
    </div>
    <div class="sidebar-nav">
      <div class="nav-label">Nội dung</div>
      <div class="nav-item active" id="nav-posts" onclick="switchSection('posts')">
        <i class="fa-solid fa-newspaper"></i> Bài viết
      </div>
      <div class="nav-item" id="nav-products" onclick="switchSection('products')">
        <i class="fa-solid fa-box"></i> Sản phẩm
      </div>
      <div class="nav-label" style="margin-top:12px">Website</div>
      <div class="nav-item" id="nav-settings" onclick="switchSection('settings')">
        <i class="fa-solid fa-gear"></i> Cài đặt
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="nav-item" onclick="doLogout()">
        <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- List View -->
    <div id="view-list">
      <div class="view-header">
        <h1 id="list-title">Bài viết Tri Thức</h1>
        <button class="btn btn-blue" onclick="openNew()"><i class="fa-solid fa-plus"></i> Tạo mới</button>
      </div>
      <div id="list-container"><div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải...</div></div>
    </div>

    <!-- Editor View -->
    <div id="view-editor">
      <div class="editor-header">
        <button class="btn" style="background:transparent;color:#9ca3af;border:1px solid #374151" onclick="closeEditor()">
          <i class="fa-solid fa-arrow-left"></i> Quay lại
        </button>
        <div style="flex:1"></div>
        <span class="save-status" id="save-status"></span>
        <button class="btn btn-blue" id="btn-save" onclick="saveContent()">
          <i class="fa-solid fa-cloud-arrow-up"></i> Lưu & Publish
        </button>
      </div>
      <div class="editor-body">
        <!-- Meta Panel -->
        <div class="meta-panel" id="meta-panel"></div>
        <!-- Quill Editor -->
        <div class="editor-area">
          <div id="quill-editor"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ==========================================
// CONFIG
// ==========================================
const PROXY = 'https://tuminh-oauth.anh-mih-509.workers.dev/gh';
const BRANCH = 'main';
const PASSWORD = 'hg8045adhna1965';

// ==========================================
// AUTH
// ==========================================
function doLogin() {
  const pwd = document.getElementById('login-pwd').value;
  if (pwd === PASSWORD) {
    sessionStorage.setItem('tm-auth', '1');
    showApp();
  } else {
    const err = document.getElementById('login-err');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}
function doLogout() {
  sessionStorage.removeItem('tm-auth');
  location.reload();
}
function showApp() {
  document.getElementById('screen-login').style.display = 'none';
  const app = document.getElementById('screen-app');
  app.style.display = 'flex';
  initQuill();
  loadList('posts');
}
if (sessionStorage.getItem('tm-auth') === '1') showApp();

// ==========================================
// QUILL INIT
// ==========================================
let quill = null;
function initQuill() {
  if (quill) return;
  
  // Custom image handler - upload to GitHub
  const toolbarOptions = [
    [{ 'header': [1, 2, 3, false] }],
    [{ 'font': [] }],
    [{ 'size': ['small', false, 'large', 'huge'] }],
    ['bold', 'italic', 'underline', 'strike'],
    [{ 'color': [] }, { 'background': [] }],
    [{ 'align': [] }],
    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
    [{ 'indent': '-1'}, { 'indent': '+1' }],
    ['blockquote', 'code-block'],
    ['link', 'image'],
    ['clean']
  ];

  quill = new Quill('#quill-editor', {
    theme: 'snow',
    modules: {
      toolbar: {
        container: toolbarOptions,
        handlers: {
          image: imageHandler
        }
      }
    }
  });
  
  // Make editor area fill height
  document.querySelector('.ql-container').style.flex = '1';
  document.querySelector('.ql-container').style.overflow = 'auto';
}

async function imageHandler() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    
    const setStatus = (msg, cls) => {
      const s = document.getElementById('save-status');
      s.textContent = msg;
      s.className = 'save-status ' + (cls || '');
    };
    
    setStatus('Đang upload ảnh...');
    try {
      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        const filename = 'images/uploads/' + Date.now() + '-' + file.name.replace(/[^a-z0-9.]/gi, '-').toLowerCase();
        
        await ghFetch('/contents/' + filename, {
          method: 'PUT',
          body: JSON.stringify({
            message: 'Upload image: ' + filename,
            content: base64,
            branch: BRANCH
          })
        });
        
        const imageUrl = '/' + filename;
        const range = quill.getSelection();
        quill.insertEmbed(range ? range.index : 0, 'image', imageUrl);
        setStatus('✓ Ảnh đã upload', 'success');
        setTimeout(() => setStatus(''), 2000);
      };
      reader.readAsDataURL(file);
    } catch(e) {
      setStatus('✗ Lỗi upload: ' + e.message, 'error');
    }
  };
  input.click();
}

// ==========================================
// GITHUB API (qua Worker proxy)
// ==========================================
async function ghFetch(path, options = {}) {
  const res = await fetch(PROXY + path, {
    method: options.method || 'GET',
    headers: { 'Content-Type': 'application/json' },
    body: options.body || undefined
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}
async function listFiles(folder) { return ghFetch('/contents/' + folder); }
async function getFile(path) { return ghFetch('/contents/' + path); }
async function saveFile(path, content, sha) {
  return ghFetch('/contents/' + path, {
    method: 'PUT',
    body: JSON.stringify({
      message: (sha ? 'Update ' : 'Create ') + path,
      content: btoa(unescape(encodeURIComponent(content))),
      branch: BRANCH,
      ...(sha ? { sha } : {})
    })
  });
}
async function deleteFile(path, sha) {
  return ghFetch('/contents/' + path, {
    method: 'DELETE',
    body: JSON.stringify({ message: 'Delete ' + path, sha, branch: BRANCH })
  });
}

// ==========================================
// STATE
// ==========================================
let currentSection = 'posts';
let currentFile = null;

// ==========================================
// NAVIGATION
// ==========================================
function switchSection(section) {
  currentSection = section;
  ['posts','products','settings'].forEach(s => {
    document.getElementById('nav-' + s)?.classList.toggle('active', s === section);
  });
  const titles = { posts: 'Bài viết Tri Thức', products: 'Sản phẩm', settings: 'Cài đặt Website' };
  document.getElementById('list-title').textContent = titles[section];
  closeEditor();
  section === 'settings' ? loadSettings() : loadList(section);
}

// ==========================================
// LIST
// ==========================================
async function loadList(section) {
  const c = document.getElementById('list-container');
  c.innerHTML = '<div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải...</div>';
  try {
    const files = await listFiles(section === 'posts' ? 'posts' : 'products');
    const items = files.filter(f => f.name.endsWith('.txt') && f.name !== 'manifest.md');
    if (!items.length) {
      c.innerHTML = '<div class="empty-state">Chưa có nội dung. Nhấn "Tạo mới" để bắt đầu.</div>';
      return;
    }
    c.innerHTML = items.map(f => {
      const slug = f.name.replace('.txt','');
      const folder = section === 'posts' ? 'posts' : 'products';
      return `<div class="post-card" onclick="openEditor('${folder}/${f.name}','${slug}','${f.sha}')">
        <div class="post-card-info">
          <div class="post-card-slug">${slug}</div>
          <div class="post-card-path">${folder}/${f.name}</div>
        </div>
        <button class="btn btn-danger" onclick="event.stopPropagation();confirmDelete('${folder}/${f.name}','${f.sha}')">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>`;
    }).join('');
  } catch(e) {
    c.innerHTML = '<div class="empty-state" style="color:#f87171">Lỗi: ' + e.message + '</div>';
  }
}

// ==========================================
// EDITOR
// ==========================================
async function openEditor(filePath, slug, sha) {
  showEditor();
  currentFile = { path: filePath, slug, sha, isNew: false };
  setStatus('Đang tải...');
  try {
    const file = await getFile(filePath);
    currentFile.sha = file.sha;
    const content = decodeURIComponent(escape(atob(file.content.replace(/\n/g,''))));
    const { meta, body } = parseFrontmatter(content);
    renderMeta(meta);
    quill.root.innerHTML = body || '';
    setStatus('');
  } catch(e) { setStatus('Lỗi: ' + e.message, 'error'); }
}

function openNew() {
  showEditor();
  currentFile = { path: null, slug: null, sha: null, isNew: true };
  renderMeta({});
  quill.root.innerHTML = '';
  setStatus('');
}

function showEditor() {
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-editor').style.display = 'flex';
}

function closeEditor() {
  document.getElementById('view-editor').style.display = 'none';
  document.getElementById('view-list').style.display = 'block';
  currentFile = null;
  const section = currentSection;
  if (section !== 'settings') loadList(section);
}

// ==========================================
// META FIELDS
// ==========================================
function renderMeta(meta) {
  const p = document.getElementById('meta-panel');
  const s = currentSection;
  
  if (s === 'posts') {
    p.innerHTML = `
      <div class="field"><label>Slug (URL) *</label><input id="f-slug" value="${meta.slug||''}" placeholder="ten-bai-viet"></div>
      <div class="field"><label>Tiêu đề *</label><input id="f-title" value="${meta.title||''}" placeholder="Tiêu đề bài viết"></div>
      <div class="field"><label>Danh mục</label>
        <select id="f-category">
          <option ${meta.category==='Kinh nghiệm Đúc'?'selected':''}>Kinh nghiệm Đúc</option>
          <option ${meta.category==='Công nghệ Luyện kim'?'selected':''}>Công nghệ Luyện kim</option>
          <option ${meta.category==='Thiết bị & Đo lường'?'selected':''}>Thiết bị & Đo lường</option>
          <option ${meta.category==='Tin tức'?'selected':''}>Tin tức</option>
        </select>
      </div>
      <div class="field"><label>Tóm tắt</label><textarea id="f-summary" rows="3" placeholder="Mô tả ngắn...">${meta.summary||''}</textarea></div>
      <div class="field">
        <label>Ảnh bìa</label>
        <div class="img-upload-area" onclick="uploadThumbnail()">
          ${meta.thumbnail ? `<img src="${meta.thumbnail}" class="img-preview"><br><small style="color:#6b7280">Click để đổi ảnh</small>` : '<i class="fa-solid fa-cloud-arrow-up" style="font-size:24px;color:#6b7280"></i><br><span style="color:#6b7280;font-size:12px;margin-top:8px;display:block">Click để upload ảnh</span>'}
        </div>
        <input type="hidden" id="f-thumbnail" value="${meta.thumbnail||''}">
      </div>
      <div class="field"><label>Alt text ảnh</label><input id="f-thumbnail_alt" value="${meta.thumbnail_alt||''}"></div>
      <div class="field"><label>Thời gian đọc</label><input id="f-read_time" value="${meta.read_time||'5 phút đọc'}"></div>
    `;
  } else {
    p.innerHTML = `
      <div class="field"><label>Slug (URL) *</label><input id="f-slug" value="${meta.slug||''}" placeholder="ten-san-pham"></div>
      <div class="field"><label>Tên sản phẩm *</label><input id="f-title" value="${meta.title||''}" placeholder="Tên sản phẩm"></div>
      <div class="field"><label>Mô tả ngắn</label><textarea id="f-short_description" rows="3">${meta.short_description||''}</textarea></div>
      <div class="field"><label>Danh mục hiển thị</label>
        <select id="f-section">
          <option value="cat-chu-dao" ${meta.section==='cat-chu-dao'?'selected':''}>⭐ Sản phẩm Chủ Đạo</option>
          <option value="cat-phan-tich" ${meta.section==='cat-phan-tich'?'selected':''}>1. Phân tích & Đo lường</option>
          <option value="cat-thi-nghiem" ${meta.section==='cat-thi-nghiem'?'selected':''}>2. Thí nghiệm Cát đúc</option>
          <option value="cat-phu-tro" ${meta.section==='cat-phu-tro'?'selected':''}>3. Phụ trợ & Gia công</option>
          <option value="cat-vat-tu" ${meta.section==='cat-vat-tu'?'selected':''}>4. Vật tư & Phụ tùng</option>
          <option value="cat-generic" ${meta.section==='cat-generic'?'selected':''}>5. Danh mục Tổng hợp</option>
        </select>
      </div>
      <div class="field">
        <label>Ảnh thumbnail</label>
        <div class="img-upload-area" onclick="uploadThumbnail()">
          ${meta.thumbnail ? `<img src="${meta.thumbnail}" class="img-preview"><br><small style="color:#6b7280">Click để đổi ảnh</small>` : '<i class="fa-solid fa-cloud-arrow-up" style="font-size:24px;color:#6b7280"></i><br><span style="color:#6b7280;font-size:12px;margin-top:8px;display:block">Click để upload</span>'}
        </div>
        <input type="hidden" id="f-thumbnail" value="${meta.thumbnail||''}">
      </div>
      <div class="field"><label>Alt text ảnh</label><input id="f-thumbnail_alt" value="${meta.thumbnail_alt||''}"></div>
      <div class="field" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="f-featured" ${meta.featured==='true'?'checked':''} style="width:16px;height:16px;accent-color:#2563eb">
        <label for="f-featured" style="text-transform:none;font-size:13px;margin:0">Sản phẩm chủ đạo</label>
      </div>
    `;
  }
}

async function uploadThumbnail() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    setStatus('Đang upload ảnh bìa...');
    try {
      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        const filename = 'images/uploads/' + Date.now() + '-' + file.name.replace(/[^a-z0-9.]/gi,'-').toLowerCase();
        await ghFetch('/contents/' + filename, {
          method: 'PUT',
          body: JSON.stringify({ message: 'Upload thumbnail', content: base64, branch: BRANCH })
        });
        const url = '/' + filename;
        document.getElementById('f-thumbnail').value = url;
        document.querySelector('.img-upload-area').innerHTML = `<img src="${url}" class="img-preview"><br><small style="color:#6b7280">Click để đổi ảnh</small>`;
        setStatus('✓ Upload thành công', 'success');
        setTimeout(() => setStatus(''), 2000);
      };
      reader.readAsDataURL(file);
    } catch(e) { setStatus('✗ Lỗi: ' + e.message, 'error'); }
  };
  input.click();
}

// ==========================================
// SAVE
// ==========================================
async function saveContent() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang lưu...';
  
  try {
    const slug = document.getElementById('f-slug')?.value?.trim();
    if (!slug) { alert('Vui lòng nhập Slug!'); return; }
    
    const folder = currentSection === 'posts' ? 'posts' : 'products';
    const filePath = folder + '/' + slug + '.txt';
    
    // Collect meta
    const meta = {};
    document.querySelectorAll('[id^="f-"]').forEach(el => {
      const key = el.id.replace('f-','');
      if (el.type === 'checkbox') meta[key] = el.checked ? 'true' : 'false';
      else if (el.type !== 'hidden' || el.value) meta[key] = el.value;
    });
    
    const body = quill.root.innerHTML;
    let fm = '---\n';
    Object.entries(meta).forEach(([k,v]) => { if (v) fm += k + ': ' + v + '\n'; });
    fm += '---\n\n' + body;
    
    // Get current SHA if file exists
    let sha = currentFile.sha;
    if (!sha && !currentFile.isNew) {
      try { const f = await getFile(filePath); sha = f.sha; } catch(e) {}
    }
    
    await saveFile(filePath, fm, sha);
    
    // Refresh SHA
    try { const f = await getFile(filePath); currentFile.sha = f.sha; currentFile.isNew = false; currentFile.path = filePath; } catch(e) {}
    
    setStatus('✓ Đã lưu ' + new Date().toLocaleTimeString('vi-VN'), 'success');
    setTimeout(() => setStatus(''), 3000);
  } catch(e) {
    setStatus('✗ ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Lưu & Publish';
  }
}

// ==========================================
// DELETE
// ==========================================
async function confirmDelete(path, sha) {
  if (!confirm('Xóa "' + path + '"?')) return;
  try {
    await deleteFile(path, sha);
    loadList(currentSection);
  } catch(e) { alert('Lỗi: ' + e.message); }
}

// ==========================================
// SETTINGS
// ==========================================
async function loadSettings() {
  const c = document.getElementById('list-container');
  document.getElementById('view-list').style.display = 'block';
  c.innerHTML = '<div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải...</div>';
  try {
    const file = await getFile('settings/site.md');
    const content = decodeURIComponent(escape(atob(file.content.replace(/\n/g,''))));
    const { meta } = parseFrontmatter(content);
    c.innerHTML = `<div style="max-width:500px">
      <div style="margin-bottom:20px">
        ${Object.entries(meta).map(([k,v]) => `
          <div class="field" style="margin-bottom:14px">
            <label>${k}</label>
            <input id="s-${k}" value="${v.replace(/"/g,'&quot;')}">
          </div>
        `).join('')}
        <button class="btn btn-blue" onclick="saveSettings('${file.sha}')">
          <i class="fa-solid fa-cloud-arrow-up"></i> Lưu cài đặt
        </button>
      </div>
    </div>`;
  } catch(e) { c.innerHTML = '<div style="color:#f87171">Lỗi: ' + e.message + '</div>'; }
}

async function saveSettings(sha) {
  try {
    const fields = {};
    document.querySelectorAll('[id^="s-"]').forEach(el => { fields[el.id.replace('s-','')] = el.value; });
    let c = '---\n';
    Object.entries(fields).forEach(([k,v]) => c += k + ': ' + v + '\n');
    c += '---\n';
    await saveFile('settings/site.md', c, sha);
    alert('✓ Đã lưu!');
  } catch(e) { alert('Lỗi: ' + e.message); }
}

// ==========================================
// HELPERS
// ==========================================
function setStatus(msg, cls) {
  const s = document.getElementById('save-status');
  s.textContent = msg;
  s.className = 'save-status ' + (cls || '');
}

function parseFrontmatter(text) {
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const m = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) return { meta:{}, body:text };
  const meta = {};
  m[1].split('\n').forEach(line => {
    const i = line.indexOf(':');
    if (i<0) return;
    meta[line.slice(0,i).trim()] = line.slice(i+1).trim().replace(/^["']|["']$/g,'');
  });
  return { meta, body: m[2].trim() };
}
